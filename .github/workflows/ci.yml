name: CI / Release

on:
  push:
    tags: ['v*']

jobs:
  # ── Frontend (built once, shared across all platform builds) ─────────────────
  frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
        working-directory: frontend

      - run: npm run build
        working-directory: frontend

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: client/static/dist/

  # ── Go binaries (cross-compiled for release tags only) ───────────────────────
  build-release:
    name: Release build ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: frontend
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
            ext: .exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: client/static/dist/

      - uses: actions/setup-go@v5
        with:
          go-version-file: client/go.mod
          cache-dependency-path: |
            client/go.sum
            server/go.sum

      - name: Build mattube-client
        run: mkdir -p ../bin && go build -o ../bin/mattube-client${{ matrix.ext }} .
        working-directory: client
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}

      - name: Build mattube-server
        run: go build -o ../bin/mattube-server${{ matrix.ext }} .
        working-directory: server
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/

  # ── .deb packages (linux only) ────────────────────────────────────────────────
  package-deb:
    name: Package .deb (${{ matrix.goarch }})
    needs: build-release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goarch: amd64
            deb_arch: amd64
          - goarch: arm64
            deb_arch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: binaries-linux-${{ matrix.goarch }}
          path: bin/

      - uses: actions/setup-go@v5
        with:
          go-version-file: client/go.mod
          cache-dependency-path: |
            client/go.sum
            server/go.sum

      - name: Install nfpm
        env:
          NFPM_VERSION: v2.46.3
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          GOBIN="$RUNNER_TEMP/bin" go install github.com/goreleaser/nfpm/v2/cmd/nfpm@"$NFPM_VERSION"
          export PATH="$RUNNER_TEMP/bin:$PATH"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
          nfpm --version

      - name: Determine version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          else
            echo "VERSION=0.0.0+$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"
          fi

      - name: Download yt-dlp and ffmpeg for server deb
        run: |
          if [ "${{ matrix.goarch }}" = "amd64" ]; then
            YTDLP_URL="https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp"
            FFMPEG_URL="https://github.com/yt-dlp/FFmpeg-Builds/releases/latest/download/ffmpeg-master-latest-linux64-gpl.tar.xz"
          else
            YTDLP_URL="https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_linux_aarch64"
            FFMPEG_URL="https://github.com/yt-dlp/FFmpeg-Builds/releases/latest/download/ffmpeg-master-latest-linuxarm64-gpl.tar.xz"
          fi
          curl -sSL "$YTDLP_URL" -o bin/yt-dlp
          curl -sSL "$FFMPEG_URL" | tar -xJ --strip-components=2 -C bin/ --wildcards '*/bin/ffmpeg'
          chmod 755 bin/yt-dlp bin/ffmpeg

      - name: Build .deb packages
        run: |
          mkdir -p dist
          ARCH=${{ matrix.deb_arch }} nfpm package -f deploy/nfpm-client.yaml -p deb -t dist/
          ARCH=${{ matrix.deb_arch }} nfpm package -f deploy/nfpm-server.yaml -p deb -t dist/

      - uses: actions/upload-artifact@v4
        with:
          name: debs-${{ matrix.goarch }}
          path: dist/

  # ── GitHub Release (on version tags) ──────────────────────────────────────────
  release:
    name: GitHub Release
    needs: [build-release, package-deb]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: binaries-*
          path: artifacts/
          merge-multiple: false

      - uses: actions/download-artifact@v4
        with:
          pattern: debs-*
          path: debs/
          merge-multiple: false

      - name: Collect and rename release assets
        run: |
          mkdir release
          for dir in artifacts/*/; do
            os_arch="${dir#artifacts/binaries-}"  # e.g. linux-amd64/
            os_arch="${os_arch%/}"
            for f in "$dir"*; do
              fname=$(basename "$f")
              if [[ "$fname" == *.exe ]]; then
                cp "$f" "release/${fname%.exe}-${os_arch}.exe"
              else
                cp "$f" "release/${fname}-${os_arch}"
              fi
            done
          done
          find debs/ -name "*.deb" -exec cp {} release/ \;

      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
